governance:
  version: "1.0"
  model: linguistic
  check_tests: false

# ── Idiom governs itself via Basis ───────────────────────────────────
#
# Functional core:
#   dictionary     — Inert nouns. Pattern types, confidence, convention summary.
#   laboratory     — Pure logic. Pattern extraction, frequency analysis, reporting.
#
# Imperative shell:
#   rules-loader   — Discovers and loads .idiom.yaml override files.
#   scan-engine    — File walking, language-specific name extraction.
#   cli-runner     — CLI entry point. Argument parsing, output formatting.

# ── External Layers ──────────────────────────────────────────────────

layers:
  serialization:
    external: true
    role: "Serialization and deserialization"
    packages: [serde, thiserror]

  parsing:
    external: true
    role: "File format parsing"
    packages: [serde_yaml, serde_json]

  cli:
    external: true
    role: "Command-line argument parsing"
    packages: [clap]

  rust-internal:
    external: true
    role: "Rust language-internal imports"
    packages: [crate, super, self, std, core, alloc]

# ── Internal Layers ──────────────────────────────────────────────────

  dictionary:
    role: "Inert nouns. Pattern types, confidence scores, convention summaries, override spec."
    packages:
      - "src/spec"
      - "src/pattern"
    rules:
      purity: strict
      io: forbidden
      network: forbidden
      async: forbidden
    depends_on: [serialization, rust-internal]

  laboratory:
    role: "Pure logic. Pattern extraction from name lists, frequency analysis, deviation detection, report rendering."
    packages:
      - "src/analyze"
      - "src/report"
    rules:
      purity: strict
      io: forbidden
      network: forbidden
      async: forbidden
    depends_on: [dictionary, serialization, parsing, rust-internal]

  rules-loader:
    role: "Discovers and loads .idiom.yaml override files from directory tree."
    packages:
      - "src/loader"
    rules:
      purity: relaxed
      io: allowed
    depends_on: [dictionary, rust-internal, parsing]

  scan-engine:
    role: "File walking, language-specific name extraction, orchestration."
    packages:
      - "src/scan"
      - "src/language"
    rules:
      purity: relaxed
      io: allowed
    depends_on: [dictionary, laboratory, rules-loader, rust-internal]

  cli-runner:
    role: "CLI entry point. Argument parsing, output formatting, process exit."
    packages:
      - "src/main"
    rules:
      purity: relaxed
      io: allowed
    depends_on: [scan-engine, laboratory, rules-loader, cli, parsing, rust-internal]

# ── Purity Axis ──────────────────────────────────────────────────────

purity:
  enabled: true
  forbidden_in_strict:
    - "file_io"
    - "network_io"
    - "stdout"
    - "stderr"
    - "env_vars"
    - "system_clock"
    - "subprocess"
    - "process"
