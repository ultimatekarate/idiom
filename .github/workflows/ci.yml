name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clippy
        run: cargo clippy --manifest-path idiom/Cargo.toml -- -D warnings

      - name: Build idiom
        run: cargo build --manifest-path idiom/Cargo.toml

      - name: Test idiom
        run: cargo test --manifest-path idiom/Cargo.toml

      - name: Self-check
        run: cargo run --manifest-path idiom/Cargo.toml -- check --spec basis.yaml .
